name: Update live dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */6 * * *'

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build data/live.json
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          POLYMARKET_RECESSION_PROB: ${{ vars.POLYMARKET_RECESSION_PROB }}
        run: |
          python scripts/build_live_data.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/live.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git commit -m "Update live dashboard data"
          git push
