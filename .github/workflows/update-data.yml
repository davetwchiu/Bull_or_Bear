name: Update live dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build live data JSON
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          POLYMARKET_RECESSION_PROB: ${{ vars.POLYMARKET_RECESSION_PROB }}
        run: python scripts/build_live_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          git diff --cached --quiet && exit 0
          git commit -m "Update live dashboard data"
          git push
