name: 自動更新市場數據

on:
  schedule:
    # 每日 UTC 時間 00:00 執行 (大約香港時間朝早 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許喺 GitHub 網頁手動撳掣執行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 👇 就係加咗呢段！明確賦予 GitHub Actions 寫入檔案嘅權限
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: pip install requests yfinance pandas lxml html5lib

      - name: 🚀 Run Python Script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_data.py

      - name: 💾 Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live.json
          # 如果資料有更新先 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新：市場即時數據 (live.json)" && git push)
