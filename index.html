<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>200天線風險儀表板｜互動版</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --primary: #3498db;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --border-radius: 12px;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.6; }
        h1, h2, h3 { margin-top: 0; }
        
        .header-title { text-align: center; margin-bottom: 30px; }
        .header-title p { color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        .dashboard-container { display: flex; flex-wrap: wrap; gap: 30px; max-width: 1300px; margin: 0 auto; }
        .panel-left { flex: 1 1 400px; }
        .panel-right { flex: 1 1 500px; position: sticky; top: 20px; height: fit-content; }

        .card { background: var(--card-bg); border-radius: var(--border-radius); box-shadow: 0 6px 15px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 20px; }
        .card-header { font-size: 1.2rem; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .timestamp { font-size: 0.85rem; color: var(--text-muted); font-weight: normal; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.95rem; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.3s; }
        .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3); }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #2980b9; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: #ebf5fb; }

        .tooltip-icon { display: inline-block; background: #e0e0e0; color: #555; border-radius: 50%; width: 18px; height: 18px; text-align: center; font-size: 12px; line-height: 18px; cursor: help; margin-left: 5px; }
        .tooltip-icon[title]:hover::after { content: attr(title); position: absolute; background: #333; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 0.85rem; white-space: nowrap; z-index: 10; margin-top: -30px; margin-left: 10px; }

        .score-board { display: flex; flex-direction: column; gap: 15px; margin-bottom: 10px; }
        .score-info { font-size: 0.8rem; color: #95a5a6; margin-top: -10px; margin-bottom: 15px; font-style: italic; }
        .bar-container { width: 100%; background: #eee; border-radius: 8px; height: 20px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; transition: width 0.5s ease-in-out; }
        .bar-risk { background: linear-gradient(90deg, var(--warning), var(--danger)); }
        .bar-buy { background: linear-gradient(90deg, #a8e6cf, var(--success)); }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .metric-box { background: #fafafa; border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; }
        .metric-box h4 { margin: 0 0 10px 0; font-size: 0.9rem; color: var(--text-muted); }
        .metric-value { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .metric-status { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        
        .status-safe { background: #d4edda; color: #155724; }
        .status-warn { background: #fff3cd; color: #856404; }
        .status-danger { background: #f8d7da; color: #721c24; }

        .conclusion-box { padding: 20px; border-left: 6px solid var(--primary); background: #ebf5fb; border-radius: 0 8px 8px 0; margin-top: 20px; }
        
        @media (max-width: 900px) { .panel-right { position: static; } }
    </style>
</head>
<body>

    <div class="header-title">
        <h1>📉 200天線風險儀表板｜互動版</h1>
        <p>按影片邏輯重建：先看跌穿200天線，再分辨事件驅動修正，還是結構性熊市。</p>
    </div>

    <div class="dashboard-container">
        <div class="panel-left">
            <div class="card">
                <div class="card-header">🎛️ 控制面板</div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="fetchLiveRepoData()" id="btnFetchLive">🔄 載入 Repo 即時數據</button>
                    <button class="btn btn-outline" onclick="loadVideoValues()">🎥 載入影片預設值</button>
                </div>

                <div class="form-group">
                    <label>S&P 500 現價</label>
                    <input type="number" id="inputSP500" class="form-control" value="6506">
                </div>
                <div class="form-group">
                    <label>200天移動平均線 (200MA)</label>
                    <input type="number" id="input200MA" class="form-control" value="6621">
                </div>
                <div class="form-group">
                    <label>VIX 恐慌指數</label>
                    <input type="number" id="inputVIX" class="form-control" value="25.4" step="0.1">
                </div>
                <div class="form-group">
                    <label>High Yield Credit Spread (bp) <span class="tooltip-icon" title="高收益債券信用利差，高於400bp需戒備">?</span></label>
                    <input type="number" id="inputSpread" class="form-control" value="380">
                </div>
                <div class="form-group">
                    <label>Richmond Fed SOS <span class="tooltip-icon" title="大於0.2代表實體經濟衰退風險增加">?</span></label>
                    <input type="number" id="inputSOS" class="form-control" value="0.15" step="0.01">
                </div>
                <div class="form-group">
                    <label>AT50 (%) <span class="tooltip-icon" title="標普500處於50天線上股票比例，低於20%視為極度超賣">?</span></label>
                    <input type="number" id="inputAT50" class="form-control" value="20">
                </div>

                <div class="card-header" style="margin-top: 30px; font-size: 1rem;">情境設定 (手動判斷)</div>
                
                <div class="form-group">
                    <label>跌破前已企穩200天線 (交易日) <span class="tooltip-icon" title="大過 126 日 (約 6 個月) 視為長期企穩，反彈勝率極高">?</span></label>
                    <input type="number" id="inputStableDays" class="form-control" value="214">
                </div>

                <div class="form-group">
                    <label>觸發原因</label>
                    <select class="form-control" id="triggerReason">
                        <option value="event">事件驅動 / 宏觀恐慌</option>
                        <option value="cycle">週期性 / 滯脹風險</option>
                        <option value="structure">結構性 / 信貸問題</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>原因可否撤回</label>
                    <select class="form-control" id="triggerReversible">
                        <option value="yes">可以 (短線衝擊)</option>
                        <option value="partial">部分可以</option>
                        <option value="no">不可以 (長線改變)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>收復200天線狀態</label>
                    <select class="form-control" id="recoveryStatus">
                        <option value="unrecovered">未收復</option>
                        <option value="fast">5–15個交易日內快速收復</option>
                        <option value="stable">收復後已企穩</option>
                        <option value="failed">收復後再次跌破 (極危險)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="panel-right">
            <div class="card">
                <div class="card-header">
                    <span>📊 實時分析結果</span>
                    <span class="timestamp" id="dataTimestamp">🕒 數據: 尚未載入</span>
                </div>
                
                <div class="score-board">
                    <div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <strong>熊市風險分數</strong> <span id="riskScoreText">1.5 / 5.0</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar-fill bar-risk" id="riskBar" style="width: 30%;"></div>
                        </div>
                    </div>
                    <div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <strong>買入準備分數</strong> <span id="buyScoreText">1 / 3</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar-fill bar-buy" id="buyBar" style="width: 33%;"></div>
                        </div>
                    </div>
                </div>
                <div class="score-info">* 分數由 200MA乖離率、VIX、信用利差、SOS 指標及下方情境設定綜合計算得出。</div>

                <div class="metrics-grid">
                    <div class="metric-box">
                        <h4>S&P 500 vs 200MA</h4>
                        <div class="metric-value" id="dispSP500">--</div>
                        <div class="metric-status" id="statusSP500">載入中</div>
                    </div>
                    <div class="metric-box">
                        <h4>VIX 恐慌指數</h4>
                        <div class="metric-value" id="dispVIX">--</div>
                        <div class="metric-status" id="statusVIX">載入中</div>
                    </div>
                    <div class="metric-box">
                        <h4>Credit Spread</h4>
                        <div class="metric-value" id="dispSpread">--</div>
                        <div class="metric-status" id="statusSpread">載入中</div>
                    </div>
                    <div class="metric-box">
                        <h4>Richmond SOS</h4>
                        <div class="metric-value" id="dispSOS">--</div>
                        <div class="metric-status" id="statusSOS">載入中</div>
                    </div>
                </div>

                <div class="conclusion-box">
                    <h3 style="margin-top: 0; color: var(--primary);">💡 部署建議</h3>
                    <p id="finalAdvice">等待數據載入...</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 初始化與事件監聽
        // ==========================================
        document.addEventListener("DOMContentLoaded", () => {
            loadFromLocalStorage();
            updateDashboard();

            const inputs = document.querySelectorAll('.form-control');
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    updateDashboard();
                    saveToLocalStorage();
                });
            });
        });

        // ==========================================
        // 核心計算邏輯
        // ==========================================
        function updateDashboard() {
            const sp500 = parseFloat(document.getElementById('inputSP500').value) || 0;
            const ma200 = parseFloat(document.getElementById('input200MA').value) || 0;
            const vix = parseFloat(document.getElementById('inputVIX').value) || 0;
            const spread = parseFloat(document.getElementById('inputSpread').value) || 0;
            const sos = parseFloat(document.getElementById('inputSOS').value) || 0;
            const at50 = parseFloat(document.getElementById('inputAT50').value) || 0; 
            
            const stableDays = parseInt(document.getElementById('inputStableDays').value) || 0;
            const triggerReason = document.getElementById('triggerReason').value;
            const triggerReversible = document.getElementById('triggerReversible').value;
            const recoveryStatus = document.getElementById('recoveryStatus').value;

            // 126 個交易日大約等於半年
            const stableStatus = (stableDays >= 126) ? 'long' : 'short';

            let riskScore = 0;
            let buyScore = 0;

            // --- A. S&P 500 ---
            const spDiffPercent = ma200 !== 0 ? ((sp500 - ma200) / ma200) * 100 : 0;
            const elStatusSP500 = document.getElementById('statusSP500');
            document.getElementById('dispSP500').innerText = sp500;
            
            if (spDiffPercent >= 0) {
                elStatusSP500.innerText = `企穩 +${spDiffPercent.toFixed(1)}%`;
                elStatusSP500.className = 'metric-status status-safe';
            } else if (spDiffPercent >= -1.5) {
                elStatusSP500.innerText = `誤差邊緣 ${spDiffPercent.toFixed(1)}%`;
                elStatusSP500.className = 'metric-status status-warn';
                riskScore += 0.5;
            } else {
                elStatusSP500.innerText = `跌穿 ${spDiffPercent.toFixed(1)}%`;
                elStatusSP500.className = 'metric-status status-danger';
                riskScore += 1.0;
            }

            // --- B. VIX ---
            const elStatusVIX = document.getElementById('statusVIX');
            document.getElementById('dispVIX').innerText = vix.toFixed(1);
            if (vix >= 30) {
                elStatusVIX.innerText = "極度恐慌";
                elStatusVIX.className = 'metric-status status-danger';
                riskScore += 1.0;
                buyScore += 1;
            } else if (vix >= 20) {
                elStatusVIX.innerText = "波動增加";
                elStatusVIX.className = 'metric-status status-warn';
                riskScore += 0.5;
            } else {
                elStatusVIX.innerText = "市場平靜";
                elStatusVIX.className = 'metric-status status-safe';
            }

            // --- C. Spread ---
            const elStatusSpread = document.getElementById('statusSpread');
            document.getElementById('dispSpread').innerText = `${spread} bp`;
            if (spread >= 500) {
                elStatusSpread.innerText = "資金斷裂";
                elStatusSpread.className = 'metric-status status-danger';
                riskScore += 1.5;
            } else if (spread >= 400) {
                elStatusSpread.innerText = "信貸收緊";
                elStatusSpread.className = 'metric-status status-warn';
                riskScore += 0.5;
            } else {
                elStatusSpread.innerText = "流動性健康";
                elStatusSpread.className = 'metric-status status-safe';
            }

            // --- D. SOS ---
            const elStatusSOS = document.getElementById('statusSOS');
            document.getElementById('dispSOS').innerText = sos.toFixed(2);
            if (sos >= 0.2) {
                elStatusSOS.innerText = "衰退紅燈";
                elStatusSOS.className = 'metric-status status-danger';
                riskScore += 1.5;
            } else {
                elStatusSOS.innerText = "未見衰退";
                elStatusSOS.className = 'metric-status status-safe';
            }

            // --- E. 新增：情境判定加權 ---
            if (triggerReason === 'structure') riskScore += 1.0;
            if (triggerReason === 'cycle') riskScore += 0.5;
            
            if (triggerReversible === 'no') riskScore += 0.5;
            if (recoveryStatus === 'failed') riskScore += 1.5; // 收復後再跌破係極度利淡信號
            
            if (at50 <= 20) buyScore += 1;  
            if (spDiffPercent < 0 && riskScore < 2.5 && stableStatus === 'long') buyScore += 1;

            riskScore = Math.min(riskScore, 5.0);
            buyScore = Math.min(buyScore, 3);

            document.getElementById('riskScoreText').innerText = `${riskScore.toFixed(1)} / 5.0`;
            document.getElementById('buyScoreText').innerText = `${buyScore} / 3`;
            document.getElementById('riskBar').style.width = `${(riskScore / 5) * 100}%`;
            document.getElementById('buyBar').style.width = `${(buyScore / 3) * 100}%`;

            generateAdvice(spDiffPercent, riskScore, buyScore, stableStatus, stableDays, recoveryStatus);
        }

        // ==========================================
        // 總結生成
        // ==========================================
        function generateAdvice(spDiffPercent, riskScore, buyScore, stableStatus, stableDays, recoveryStatus) {
            const adviceBox = document.getElementById('finalAdvice');
            const conclusionBox = document.querySelector('.conclusion-box');

            if (recoveryStatus === 'failed') {
                conclusionBox.style.borderLeftColor = "var(--danger)";
                conclusionBox.style.background = "#fdeded";
                adviceBox.innerHTML = `<strong style="color:var(--danger); font-size:1.1rem;">🚨 極高風險: 200天線由支持變阻力！</strong><br><br>大市曾嘗試收復 200天線但失敗再次跌破，這是典型結構性熊市的確認信號。強烈建議大幅減低倉位，做好對沖防守。`;
                return;
            }

            if (spDiffPercent < 0 && riskScore >= 3.0) {
                conclusionBox.style.borderLeftColor = "var(--danger)";
                conclusionBox.style.background = "#fdeded";
                adviceBox.innerHTML = `<strong style="color:var(--danger); font-size:1.1rem;">🚨 REAL RISK: 觸發結構性熊市/衰退警報！</strong><br><br>指數已跌穿 200天線，且宏觀基本面同步惡化。歷史數據顯示此情境下跌風險極高，<b>切勿急於撈底</b>，建議提高現金比例或做好對沖防守。`;
            } else if (spDiffPercent < 0 && riskScore < 3.0) {
                conclusionBox.style.borderLeftColor = "var(--warning)";
                conclusionBox.style.background = "#fffbea";
                let historyText = stableStatus === 'long' 
                    ? `跌破前已連續企穩 <b>${stableDays} 個交易日</b>（超過半年），後續 12 個月正回報機率極高（達 82%）。` 
                    : `但留意之前只企穩咗 <b>${stableDays} 個交易日</b>，根基較弱，反彈未必長久。`;
                
                adviceBox.innerHTML = `<strong style="color:#b8860b; font-size:1.1rem;">⚠️ 注意: 200天線失守，但傾向為「事件驅動假訊號」。</strong><br><br>大市雖然跌破 200MA，但基本面與流動性未見紅燈。${historyText}<br><br><b>買入準備：${buyScore}/3</b>。若 VIX 飆升或 AT50 進入極度超賣，可視為黃金分批吸納機會。`;
            } else {
                conclusionBox.style.borderLeftColor = "var(--success)";
                conclusionBox.style.background = "#eefaf3";
                adviceBox.innerHTML = `<strong style="color:var(--success); font-size:1.1rem;">✅ 趨勢健康: 牛市進攻狀態</strong><br><br>指數穩守 200天線之上，宏觀風險可控。順勢而為，保持長倉策略。若短期遇回調，只要未失守 200MA 均視為正常波動。`;
            }
        }

        // ==========================================
        // 讀取 GitHub Repo (live.json)
        // ==========================================
        async function fetchLiveRepoData() {
            const btn = document.getElementById('btnFetchLive');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ 讀取數據中...";
            btn.disabled = true;

            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`data/live.json?t=${timestamp}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();

                document.getElementById('inputSP500').value = data.sp500;
                document.getElementById('input200MA').value = data.ma200;
                document.getElementById('inputVIX').value = data.vix;
                document.getElementById('inputSpread').value = data.spread;
                document.getElementById('inputSOS').value = data.sos;
                
                if (data.at50 !== undefined) {
                    document.getElementById('inputAT50').value = data.at50;
                }

                if (data.stable_days !== undefined) {
                    document.getElementById('inputStableDays').value = data.stable_days;
                }

                updateDashboard();
                saveToLocalStorage();

                // 💡 聽取 ChatGPT 建議：將時間靜靜地顯示喺版面上，取消煩人嘅 Alert 彈出
                document.getElementById('dataTimestamp').innerHTML = `🕒 數據更新於: <b>${data.last_updated}</b>`;
                document.getElementById('dataTimestamp').style.color = "var(--primary)";

            } catch (error) {
                console.error("讀取 live.json 失敗:", error);
                alert("❌ 無法載入實時數據！\n請確定 GitHub Actions 已經成功運行，並且 data/live.json 檔案存在。");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ==========================================
        // LocalStorage & 影片數值
        // ==========================================
        function loadVideoValues() {
            document.getElementById('inputSP500').value = 6506;
            document.getElementById('input200MA').value = 6621;
            document.getElementById('inputVIX').value = 25.4;
            document.getElementById('inputSpread').value = 380;
            document.getElementById('inputSOS').value = 0.15;
            document.getElementById('inputAT50').value = 20; 
            document.getElementById('inputStableDays').value = 214; 
            document.getElementById('triggerReason').value = 'event';
            document.getElementById('triggerReversible').value = 'yes';
            document.getElementById('recoveryStatus').value = 'unrecovered';
            updateDashboard();
            saveToLocalStorage();
        }

        function saveToLocalStorage() {
            const data = {
                sp500: document.getElementById('inputSP500').value,
                ma200: document.getElementById('input200MA').value,
                vix: document.getElementById('inputVIX').value,
                spread: document.getElementById('inputSpread').value,
                sos: document.getElementById('inputSOS').value,
                at50: document.getElementById('inputAT50').value, 
                stableDays: document.getElementById('inputStableDays').value,
                reason: document.getElementById('triggerReason').value,
                reversible: document.getElementById('triggerReversible').value,
                recovery: document.getElementById('recoveryStatus').value
            };
            localStorage.setItem('bullBearDashboard_v4', JSON.stringify(data));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('bullBearDashboard_v4');
            if (saved) {
                const data = JSON.parse(saved);
                if(data.sp500) document.getElementById('inputSP500').value = data.sp500;
                if(data.ma200) document.getElementById('input200MA').value = data.ma200;
                if(data.vix) document.getElementById('inputVIX').value = data.vix;
                if(data.spread) document.getElementById('inputSpread').value = data.spread;
                if(data.sos) document.getElementById('inputSOS').value = data.sos;
                if(data.at50) document.getElementById('inputAT50').value = data.at50; 
                if(data.stableDays) document.getElementById('inputStableDays').value = data.stableDays;
                if(data.reason) document.getElementById('triggerReason').value = data.reason;
                if(data.reversible) document.getElementById('triggerReversible').value = data.reversible;
                if(data.recovery) document.getElementById('recoveryStatus').value = data.recovery;
            }
        }
    </script>
</body>
</html>
